name: Update woningzoeker daily

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run generator with radar
        run: python generator_github_actions.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282舫憹actions[bot]@users.noreply.github.com
          git add index.html radar_state.json radar_feed.json
          git diff --staged --quiet || git commit -m "Auto-update woningzoeker radar"
          git pull --rebase origin main
          git push

